<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <!-- Meta Ray-Ban Display / MRBD 웹앱 규격: 고정 600x600, 스크롤 금지, 확대 금지 -->
    <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="SeeSay live captions for deaf and hard-of-hearing users on Meta Ray-Ban Display glasses.">
    <!-- MRBD 호환 웹앱 선언 (디스커버리 표면·호환성 안내용) -->
    <meta name="mrbd-web-app-capable" content="yes">
    <title>SeeSay Glass Caption</title>
    <style>
      /* MRBD 는 additive 디스플레이라 어두운 배경 + 밝은 고대비 글씨가 필수다.
         색상은 rgb/hsl/이름 색으로만 둔다 (표준 토큰과 별개인 standalone 웹앱). */
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: rgb(0, 0, 0);
        --surface: rgb(18, 24, 38);
        --text: rgb(255, 255, 255);
        --text-muted: rgb(190, 200, 215);
        --border: rgb(90, 105, 130);
        --keyword: rgb(250, 204, 21);
        --alert-call: rgb(250, 204, 21); /* 호명 강조 — 글래스에서 빛을 내야 보인다 */
        --font-title: 30px;
        --font-body: 26px;
        --font-caption: 16px;
        --space-2: 8px;
        --space-3: 14px;
        --space-4: 22px;
        --safe: 8px; /* MRBD 안전 여백 (가장자리 잘림 방지) */
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 600px;
        height: 600px;
      }

      body {
        margin: 0;
        overflow: hidden; /* MRBD: 600x600 밖으로 넘치거나 스크롤되면 안 된다 */
        background: var(--bg);
        color: var(--text);
      }

      .glass-surface {
        width: 600px;
        height: 600px;
        display: grid;
        grid-template-rows: 1fr auto;
        gap: var(--space-3);
        padding: var(--space-4);
      }

      .caption-lines {
        display: grid;
        align-content: center;
        gap: var(--space-3);
        min-height: 72px;
      }

      .caption-line {
        min-height: 32px;
        padding: var(--space-2) var(--space-3);
        border: 1px solid var(--border);
        border-left: 6px solid var(--border); /* 화자 색 막대 */
        border-radius: 12px;
        background: var(--surface);
        color: var(--text);
        font-size: var(--font-body);
        line-height: 1.3;
        overflow-wrap: anywhere;
      }

      .caption-line:empty {
        border-color: transparent;
        background: transparent;
      }

      /* 화자 이름 — 화자별 색으로 구분한다 (색은 JS 가 인라인으로 지정) */
      .caption-line .spk {
        font-weight: 700;
      }

      /* 강조(특정) 단어 하이라이트 */
      .caption-line .kw {
        color: var(--keyword);
        font-weight: 700;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-2);
        min-height: 28px;
        color: var(--text-muted);
        font-size: var(--font-caption);
      }

      /* 특정 단어 알림 — 상단에 잠깐 뜨는 띠.
         MRBD 안전 여백(8dp): 화면 끝에 붙이면 rubberbanding 으로 잘린다. */
      .keyword-alert {
        display: none;
        position: fixed;
        top: var(--safe);
        left: var(--safe);
        right: var(--safe);
        padding: var(--space-2) var(--space-3);
        border-radius: 12px;
        background: rgb(60, 48, 8);
        color: var(--keyword);
        font-size: var(--font-caption);
        font-weight: 700;
        text-align: center;
      }

      .keyword-alert[data-visible="true"] {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--space-2);
      }

      .alert-icon {
        width: 18px;
        height: 18px;
        flex: none;
      }

      .name-call-icon {
        width: 44px;
        height: 44px;
        margin-bottom: var(--space-2);
      }

      /* 호명 알림 — 전체 화면 (호명 강조 색 토큰 유지) */
      .name-call {
        display: none;
        position: fixed;
        inset: var(--safe);
        border-radius: 24px;
        padding: var(--space-4);
        background: var(--alert-call);
        color: rgb(20, 20, 20);
        place-items: center;
        text-align: center;
      }

      .name-call[data-visible="true"] {
        display: grid;
        /* 진동을 쓸 수 없으므로(SDK 미지원) 시각 자극을 강하게 준다.
           주변시(peripheral vision)에서도 알아채도록 몇 번 점멸시킨다. */
        animation: name-call-pulse 0.6s ease-in-out 4;
      }

      @keyframes name-call-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
      }

      /* 움직임에 민감한 사용자는 점멸을 끈다 */
      @media (prefers-reduced-motion: reduce) {
        .name-call[data-visible="true"] {
          animation: none;
        }
      }

      .name-call strong {
        display: block;
        font-size: 36px;
        line-height: 1.15;
      }

      .name-call span {
        display: block;
        margin-top: var(--space-2);
        font-size: var(--font-body);
        line-height: 1.3;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main class="glass-surface" aria-live="polite">
      <section class="caption-lines" aria-label="최근 자막 두 줄">
        <div class="caption-line" data-caption-line="0"></div>
        <div class="caption-line" data-caption-line="1"></div>
      </section>
      <section class="status-row" aria-label="연결 상태">
        <span data-status-label>대기 중</span>
        <span data-status-meta>caption x 2</span>
      </section>
    </main>
    <div class="keyword-alert" data-keyword-alert aria-live="assertive">
      <svg class="alert-icon" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span data-keyword-alert-text></span>
    </div>
    <section class="name-call" data-name-call aria-live="assertive" aria-label="호명 알림">
      <div>
        <svg class="name-call-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
        <strong data-name-call-title>호명</strong>
        <span data-name-call-body></span>
      </div>
    </section>
    <script>
      const captions = [];
      const lines = Array.from(document.querySelectorAll('[data-caption-line]'));
      const statusLabel = document.querySelector('[data-status-label]');
      const statusMeta = document.querySelector('[data-status-meta]');
      const nameCall = document.querySelector('[data-name-call]');
      const nameCallTitle = document.querySelector('[data-name-call-title]');
      const nameCallBody = document.querySelector('[data-name-call-body]');
      const keywordAlert = document.querySelector('[data-keyword-alert]');
      const keywordAlertText = document.querySelector('[data-keyword-alert-text]');
      let nameCallTimer = null;
      let keywordTimer = null;

      const params = new URL(window.location.href).searchParams;
      // 강조할 특정 단어들. 예: ?keywords=예산,마감일
      const keywords = (params.get('keywords') || '')
        .split(',')
        .map((word) => word.trim())
        .filter(Boolean);

      function escapeHtml(value) {
        return String(value).replace(/[&<>"]/g, (ch) => (
          { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]
        ));
      }

      // 화자 이름 → 항상 같은 색 (화자 구분). 어두운 배경에서 잘 보이게 밝은 hsl.
      function speakerColor(name) {
        if (!name) {
          return 'rgb(190, 200, 215)';
        }
        let hue = 0;
        for (let i = 0; i < name.length; i += 1) {
          hue = (hue * 31 + name.charCodeAt(i)) % 360;
        }
        return `hsl(${hue}, 70%, 68%)`;
      }

      function findKeywords(text) {
        return keywords.filter((word) => text.includes(word));
      }

      // 자막 본문에서 특정 단어를 하이라이트로 감싼다 (이미 escape 된 문자열 대상).
      function highlightKeywords(escapedText) {
        let out = escapedText;
        keywords.forEach((word) => {
          const safe = escapeHtml(word);
          if (safe) {
            out = out.split(safe).join(`<span class="kw">${safe}</span>`);
          }
        });
        return out;
      }

      function renderCaptions() {
        const visible = captions.slice(-2);
        lines.forEach((line, index) => {
          const item = visible[index];
          if (!item) {
            line.innerHTML = '';
            line.style.borderLeftColor = 'transparent';
            return;
          }
          const color = speakerColor(item.speaker);
          line.style.borderLeftColor = color;
          const speaker = item.speaker || '화자';
          const body = highlightKeywords(escapeHtml(item.text));
          line.innerHTML = `<span class="spk" style="color:${color}">${escapeHtml(speaker)}</span> ${body}`;
        });
        statusLabel.textContent = visible.length > 0 ? '자막 수신 중' : '대기 중';
      }

      function showKeywordAlert(words) {
        keywordAlertText.textContent = `강조 단어: ${words.join(', ')}`;
        keywordAlert.dataset.visible = 'true';
        if (keywordTimer) {
          window.clearTimeout(keywordTimer);
        }
        keywordTimer = window.setTimeout(() => {
          keywordAlert.dataset.visible = 'false';
        }, 4000);
      }

      function showNameCall(event) {
        // 소리 방향은 알 수 없으므로(이슈 0010) "누가 불렀는지"를 크게 보여준다.
        nameCallTitle.textContent = event.speaker
          ? `${event.speaker}님이 부릅니다`
          : (event.alias || '호명');
        nameCallBody.textContent = event.text || '';
        nameCall.dataset.visible = 'true';
        if (nameCallTimer) {
          window.clearTimeout(nameCallTimer);
        }
        nameCallTimer = window.setTimeout(() => {
          nameCall.dataset.visible = 'false';
        }, 5000);
      }

      function updateStatus(event) {
        if (event.type === 'ambient_status') {
          statusLabel.textContent = event.state === 'speech' ? '발화 감지 중' : '대기 중';
          statusMeta.textContent = `${event.transport} · rms ${Number(event.rms || 0).toFixed(2)}`;
        }
        if (event.type === 'device_joined') {
          statusLabel.textContent = event.role === 'mic' ? '마이크 연결됨' : '뷰어 연결됨';
          statusMeta.textContent = event.device_name || '';
        }
        if (event.type === 'mic_transferred') {
          statusLabel.textContent = '마이크 전환';
          statusMeta.textContent = event.to_device || '';
        }
      }

      function handleEvent(event) {
        if (!event || typeof event.type !== 'string') {
          return;
        }
        if (event.type === 'caption' && typeof event.text === 'string' && event.text.length > 0) {
          captions.push({ speaker: event.speaker || null, text: event.text });
          if (captions.length > 8) {
            captions.shift();
          }
          renderCaptions();
          const hits = findKeywords(event.text);
          if (hits.length > 0) {
            showKeywordAlert(hits);
          }
        } else if (event.type === 'speaker_named') {
          // 이름 붙이기: 화면에 남은 화자N 라벨을 확정된 이름으로 바꾼다.
          captions.forEach((item) => {
            if (item.speaker === event.old_label) {
              item.speaker = event.speaker;
            }
          });
          renderCaptions();
        } else if (event.type === 'name_call') {
          showNameCall(event);
        } else {
          updateStatus(event);
        }
      }

      window.glassCaptionPush = handleEvent;

      // MRBD 는 HTTPS 로 로드되므로 실시간 자막은 wss:// 로 받는다.
      // 예: ?ws=wss://seesay.store/ws&keywords=예산,마감일
      const wsUrl = params.get('ws');
      if (wsUrl) {
        const socket = new WebSocket(wsUrl);
        socket.addEventListener('message', (message) => {
          try {
            handleEvent(JSON.parse(message.data));
          } catch {
            statusLabel.textContent = '메시지 오류';
          }
        });
        socket.addEventListener('close', () => {
          statusLabel.textContent = '연결 끊김';
        });
      }
    </script>
  </body>
</html>
